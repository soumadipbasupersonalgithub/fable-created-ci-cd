name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  auto-review:
    name: Automated Claude review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: claude-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: read # checkout only — Claude must not push commits
      pull-requests: write # post review + inline comments
      issues: write # post/update the tracking comment
      id-token: write # required by claude-code-action for OIDC auth
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request. The repository is a TypeScript (strict) +
            Playwright Test E2E framework for saucedemo.com, built on the
            page-object model. Follow the conventions and review criteria in
            CLAUDE.md at the repo root.

            Focus exclusively on correctness. Do NOT comment on style,
            formatting, naming, or subjective preferences — TypeScript strict
            mode and CI already gate the basics. Look for:

            1. Async bugs: missing `await` on Playwright actions, web-first
               assertions (`expect(locator).toHaveText(...)` etc.), or fixture
               setup. These pass silently and cause flaky or false-positive
               tests.
            2. Flakiness sources: hard waits (`page.waitForTimeout`), races
               between fully-parallel tests, state leaking across tests,
               brittle selectors where a `[data-test]` attribute exists.
            3. False confidence: assertions that cannot fail, tests that still
               pass when the behaviour they cover breaks, overly broad URL
               regexes, swallowed errors.
            4. Regressions: changes to playwright.config.ts, fixtures
               (src/fixtures/test-fixtures.ts), BasePage, or shared page
               objects that silently change the behaviour of existing tests.
            5. Security: committed secrets or tokens. The public saucedemo
               demo credentials in src/data/users.ts are expected and fine.
            6. Leftover `.only` / `.skip` on tests or describe blocks.

            Post concise inline comments only where a change is actually
            needed, using mcp__github_inline_comment__create_inline_comment.
            Finish with one short summary comment on the PR (verdict plus a
            one-line rationale). If there are no issues, post a single brief
            comment saying the PR looks correct — do not invent findings.
          claude_args: |
            --allowed-tools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"

  mention:
    name: Respond to @claude mention
    if: |
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' &&
       contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read # read-only — cannot push commits
      pull-requests: write
      issues: write
      id-token: write # required by claude-code-action for OIDC auth
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
